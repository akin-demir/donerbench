<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DönerBench logo (placeholder)">
  <defs>
    <linearGradient id="meat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2a264"/>
      <stop offset="0.45" stop-color="#c0743f"/>
      <stop offset="1" stop-color="#7b3425"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#aab4bf"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.7" r="0.7">
      <stop offset="0" stop-color="#ffd479"/>
      <stop offset="0.6" stop-color="#ff7a1f"/>
      <stop offset="1" stop-color="#ff5b15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="512" height="512" rx="96" fill="#111416"/>

  <!-- flame glow -->
  <ellipse cx="150" cy="300" rx="78" ry="150" fill="url(#flame)" opacity="0.85"/>

  <!-- skewer -->
  <rect x="248" y="70" width="16" height="372" rx="8" fill="#d9e1e6"/>

  <!-- döner cone (frustum) -->
  <path d="M196 110 H316 L300 392 H212 Z" fill="url(#meat)"/>
  <!-- layer lines -->
  <g stroke="#2a130d" stroke-opacity="0.45" stroke-width="6" stroke-linecap="round">
    <line x1="201" y1="160" x2="311" y2="160"/>
    <line x1="204" y1="210" x2="308" y2="210"/>
    <line x1="206" y1="260" x2="306" y2="260"/>
    <line x1="208" y1="310" x2="304" y2="310"/>
    <line x1="210" y1="356" x2="302" y2="356"/>
  </g>
  <!-- char highlights -->
  <g stroke="#ffd699" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round">
    <line x1="222" y1="185" x2="262" y2="185"/>
    <line x1="248" y1="285" x2="292" y2="285"/>
  </g>

  <!-- knife blade -->
  <g transform="rotate(18 360 300)">
    <path d="M330 250 H452 L470 274 H330 Z" fill="url(#blade)"/>
    <rect x="452" y="250" width="44" height="24" rx="6" fill="#202326"/>
  </g>

  <!-- falling slice -->
  <path d="M300 392 q40 8 70 26 q-36 22 -78 14 Z" fill="#f0b174" opacity="0.92"/>
</svg>
